# ============================================================
# Armado Quant — Agent Docker Compose
# ============================================================
# Coordinator (port 18800) polls every 5 min.
# All other agents are task-driven — they sleep until assigned work.
# ============================================================

x-agent-defaults: &agent-defaults
  build: .                      # builds from local Dockerfile + runner.py
  restart: unless-stopped
  networks:
    - quant-net
  environment: &agent-env
    CLAUDE_API_KEY:       ${CLAUDE_API_KEY}
    MIDDLEWARE_BASE_URL:  ${MIDDLEWARE_BASE_URL:-https://brightcore.my}

services:

  coordinator:
    <<: *agent-defaults
    container_name: quant_coordinator
    volumes:
      - ./coordinator/workspace:/home/agent/workspace:ro
    environment:
      <<: *agent-env
      OPENCLAW_AGENT_ID:   coordinator
      OPENCLAW_AGENT_NAME: "Coordinator"
      MIDDLEWARE_API_KEY:  ${COORDINATOR_API_KEY}
    ports:
      - "${COORDINATOR_PORT:-18800}:18800"

  quant-researcher:
    <<: *agent-defaults
    container_name: quant_researcher
    volumes:
      - ./quant-researcher/workspace:/home/agent/workspace:ro
    environment:
      <<: *agent-env
      OPENCLAW_AGENT_ID:   quant-researcher
      OPENCLAW_AGENT_NAME: "Quant Researcher"
      MIDDLEWARE_API_KEY:  ${QUANT_RESEARCHER_API_KEY}
    ports:
      - "${QUANT_RESEARCHER_PORT:-18801}:18800"

  backtester:
    <<: *agent-defaults
    container_name: quant_backtester
